name: Personal Fork - E2E Tests and Docker Deploy

# Triggers on any push to opsx_pp_13_99 (including merges)
on:
  push:
    branches:
      - opsx_pp_13_99

jobs:
  # ── Step 1: Build the web bundle once and share it across E2E shards ──────
  build-web:
    name: Build web bundle
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          download-translations: 'false'

      - name: Trust the repository directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build browser bundle
        # REACT_APP_NETLIFY=true keeps the "Create test file" button in the
        # production build so E2E beforeEach hooks can reach it.
        env:
          REACT_APP_NETLIFY: 'true'
        run: |
          yarn workspace plugins-service build
          yarn workspace @actual-app/crdt build
          yarn workspace @actual-app/core build:browser
          yarn workspace @actual-app/web build:browser

      - name: Upload web build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-client-build
          path: packages/desktop-client/build/
          retention-days: 1
          overwrite: true

  # ── Step 2: Run Playwright functional E2E tests in 3 parallel shards ──────
  e2e:
    name: Functional E2E (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    env:
      E2E_USE_BUILD: '1'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          download-translations: 'false'

      - name: Trust the repository directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download web build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: desktop-client-build
          path: packages/desktop-client/build/

      - name: Run E2E tests
        run: yarn e2e --shard=${{ matrix.shard }}/3

      - name: Upload test results on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: e2e-test-results-shard-${{ matrix.shard }}
          path: packages/desktop-client/test-results/
          retention-days: 7
          overwrite: true

  # ── Step 3: Build Docker image for Raspberry Pi and push to Docker Hub ────
  docker:
    name: Build and push Docker image (ARM)
    runs-on: ubuntu-latest
    needs: e2e  # Only runs when ALL e2e shards pass
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # QEMU + Buildx are required to cross-compile ARM images on an x86 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up environment
        uses: ./.github/actions/setup

      - name: Build server bundle
        run: yarn build:server

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          file: packages/sync-server/docker/ubuntu.Dockerfile
          # linux/arm/v7  → Raspberry Pi OS (32-bit, the common default)
          platforms: linux/arm/v7
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/actual-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/actual-server:${{ github.sha }}
